services:
  # Web Service
  - type: web
    name: sic-landing-page
    env: docker
    plan: free
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: sic-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sic-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: sic-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: sic-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sic-db
          property: password
      - key: FILESYSTEM_DISK
        value: public
    disk:
      name: storage-volume
      mountPath: /var/www/html/storage/app
      sizeGB: 10

databases:
  - name: sic-db
    plan: free
    databaseName: sic_db
    user: sic_user
